<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Simple YT Downloader">
    <meta name="theme-color" content="#101114">
    <title>yt-dlp Web</title>
    <link rel="icon" href="assets/mark.svg" type="image/svg+xml">
    <link rel="preload" href="styles.css" as="style">
    <link rel="stylesheet" href="styles.css">
    <script src="app.js" defer></script>
  </head>
  <body>
      <section id="download" class="workspace" aria-labelledby="download-title">
        <div class="section-title"><h2 id="download-title">YT Downloader</h2></div>
        <div class="builder">
          <form id="downloadForm" class="panel controls" aria-label="Download Form">
            <label class="field"><span>URL</span><input id="url" type="url" placeholder="https://www.youtube.com/watch?v=..." required autocomplete="off"></label>
            <fieldset>
              <legend>Mode</legend>
              <div class="segmented"><label><input type="radio" name="mode" value="video" checked><span>Video</span></label><label><input type="radio" name="mode" value="audio"><span>Audio MP3</span></label></div>
            </fieldset>
            <label class="field"><span>Retry</span><input id="retryLimit" type="number" min="0" max="20" value="3"></label>
            <label class="field"><span>Audio bitrate</span><select id="bitrate"><option value="128">128 kbps</option><option value="192" selected>192 kbps</option><option value="256">256 kbps</option><option value="320">320 kbps</option></select></label>
            <button id="startBtn" type="submit">Start</button>
          </form>

          <article class="panel preview live-panel">
            <div class="preview-head"><span>Job</span><button id="clearBtn" type="button">Clear</button></div>
            <div class="progress-shell"><div id="progressBar"></div></div>
            <dl class="status-grid"><div><dt>Status</dt><dd id="statusText">Waiting for...</dd></div><div><dt>Speed</dt><dd id="speedText">-</dd></div><div><dt>ETA</dt><dd id="etaText">-</dd></div></dl>
            <p id="messageText" class="message">Enter URL to start</p>
            <div id="files" class="files" aria-live="polite"></div>
          </article>
        </div>
      </section>
    </main>
  </body>
</html>
