name: yt-dlp-web

on:
  push:
    branches:
      - main # または master （お使いのデフォルトブランチ名）
  workflow_dispatch:

# 必要な権限の設定
permissions:
  contents: read
  pages: write
  id-token: write

# 二重ビルドを防ぐ設定
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      # 💡 ここで「./static」フォルダを指定してアップロードします
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './static' 

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
